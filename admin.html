<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Display — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #4f6ef7;
      --accent-hover: #6b85ff;
      --danger: #e05252;
      --text: #e8eaf0;
      --muted: #8b91a8;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; }

    .header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
    }
    .header-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* ── Settings panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 20px;
    }

    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input[type="password"] { letter-spacing: 0.1em; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 16px;
      border-radius: 7px;
      font-size: 13px; font-weight: 500;
      border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { background: #2e3347; color: var(--muted); cursor: not-allowed; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid transparent; padding: 6px 10px; }
    .btn-danger:hover { border-color: var(--danger); background: rgba(224,82,82,0.08); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Playlist ── */
    #playlist { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 14px;
      align-items: center;
      transition: border-color 0.15s;
    }
    .video-card:hover { border-color: #3a4060; }

    .thumb {
      width: 100px; height: 56px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface2);
      display: block;
    }
    .thumb-placeholder {
      width: 100px; height: 56px;
      border-radius: 6px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 20px;
    }

    .video-info { min-width: 0; }
    .video-label { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
    .video-id { font-family: monospace; background: var(--surface2); padding: 2px 6px; border-radius: 4px; }

    .video-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

    .order-btns { display: flex; gap: 4px; }
    .btn-order {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 13px;
      transition: background 0.1s;
    }
    .btn-order:hover { background: var(--accent); border-color: var(--accent); }
    .btn-order:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Add form ── */
    #add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 20px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e2235;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 20px;
      font-size: 13px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
    #toast.success { border-color: #3a7c5a; color: #6ee7a8; }
    #toast.error   { border-color: #7c3a3a; color: #f0a0a0; }
    #toast.info    { border-color: #3a4f7c; color: #90b8f8; }

    /* ── Save bar ── */
    .save-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      flex-wrap: wrap;
    }
    .save-bar-info { font-size: 13px; color: var(--muted); }

    /* ── Config row ── */
    .config-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 500px) {
      .config-row { grid-template-columns: 1fr; }
      .field-row  { grid-template-columns: 1fr; }
      .video-card { grid-template-columns: 80px 1fr; }
      .video-actions { grid-column: 1 / -1; flex-direction: row; justify-content: flex-end; }
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .section-title { margin-bottom: 12px; }
  </style>
</head>
<body>

<div style="max-width:680px; margin:0 auto;">

  <div class="header">
    <div class="header-dot"></div>
    <h1>Ad Display — Admin</h1>
  </div>

  <!-- ── GitHub Connection ── -->
  <h2 class="section-title">Kết nối GitHub</h2>
  <div class="panel">
    <div class="field-row">
      <div class="field">
        <label>Owner / Org</label>
        <input id="gh-owner" type="text" placeholder="CPS-VHWS" value="CPS-VHWS">
      </div>
      <div class="field">
        <label>Repository</label>
        <input id="gh-repo" type="text" placeholder="cps-ad-display" value="cps-ad-display">
      </div>
    </div>
    <div class="field">
      <label>Personal Access Token
        <span style="color:var(--muted); font-weight:400"> — </span>
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=cps-ad-display" target="_blank"
           style="color:var(--accent); text-decoration:none; font-size:11px;">Tạo token mới ↗</a>
      </label>
      <input id="gh-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    </div>
    <button class="btn btn-secondary btn-sm" onclick="loadFromGitHub()">
      ↓ Tải playlist từ GitHub
    </button>
  </div>

  <!-- ── Playlist ── -->
  <h2 class="section-title">Playlist</h2>
  <div id="playlist"></div>

  <!-- ── Add video ── -->
  <div id="add-form">
    <h2 style="margin-bottom:14px;">Thêm video</h2>
    <div class="field">
      <label>YouTube URL hoặc Video ID</label>
      <input id="new-url" type="text" placeholder="https://youtube.com/watch?v=... hoặc dQw4w9WgXcQ"
             oninput="previewNewThumb()">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Tên video (tuỳ chọn)</label>
        <input id="new-label" type="text" placeholder="Quảng cáo sản phẩm A">
      </div>
      <div class="field">
        <label>Thời lượng (giây, tuỳ chọn)</label>
        <input id="new-duration" type="number" placeholder="60" min="1">
      </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="addVideo()">+ Thêm vào playlist</button>
      <img id="new-thumb" src="" alt="" style="height:40px; border-radius:5px; display:none;">
    </div>
  </div>

  <!-- ── App settings ── -->
  <h2 class="section-title">Cài đặt app</h2>
  <div class="panel" style="margin-bottom:20px;">
    <div class="config-row">
      <div class="field">
        <label>Mốc đồng bộ (phút)</label>
        <input id="cfg-sync" type="number" value="5" min="1" max="60">
      </div>
      <div class="field">
        <label>Giờ tự động reload</label>
        <input id="cfg-reload-hour" type="number" value="8" min="0" max="23">
      </div>
    </div>
    <div class="field" style="display:flex; align-items:center; gap:8px; margin-top:4px;">
      <input id="cfg-status" type="checkbox" checked style="width:auto;">
      <label style="margin:0; cursor:pointer;" for="cfg-status">Hiện thanh trạng thái</label>
    </div>
  </div>

  <!-- ── Save ── -->
  <div class="save-bar">
    <span class="save-bar-info" id="save-info">Chưa có thay đổi nào được lưu.</span>
    <button class="btn btn-primary" id="btn-save" onclick="saveToGitHub()" disabled>
      ↑ Lưu lên GitHub
    </button>
  </div>

</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────
let playlist = [];
let dirty    = false;

// ── Persist token / settings in localStorage ──────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('cps_admin');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      if (d.token)  document.getElementById('gh-token').value  = d.token;
      if (d.owner)  document.getElementById('gh-owner').value  = d.owner;
      if (d.repo)   document.getElementById('gh-repo').value   = d.repo;
    } catch {}
  }
  markDirty(false);
});

function saveLocalSettings() {
  localStorage.setItem('cps_admin', JSON.stringify({
    token: document.getElementById('gh-token').value.trim(),
    owner: document.getElementById('gh-owner').value.trim(),
    repo : document.getElementById('gh-repo').value.trim(),
  }));
}

// ── Extract YouTube ID ─────────────────────────────────────────
function extractYTId(input) {
  input = input.trim();
  const patterns = [
    /[?&]v=([A-Za-z0-9_-]{11})/,
    /youtu\.be\/([A-Za-z0-9_-]{11})/,
    /embed\/([A-Za-z0-9_-]{11})/,
    /^([A-Za-z0-9_-]{11})$/,
  ];
  for (const p of patterns) {
    const m = input.match(p);
    if (m) return m[1];
  }
  return null;
}

function thumbUrl(id) {
  return `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
}

// ── Preview thumb while typing ─────────────────────────────────
function previewNewThumb() {
  const id  = extractYTId(document.getElementById('new-url').value);
  const img = document.getElementById('new-thumb');
  if (id) {
    img.src = thumbUrl(id);
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }
}

// ── Render playlist ───────────────────────────────────────────
function render() {
  const container = document.getElementById('playlist');
  if (!playlist.length) {
    container.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:12px 0;">
      Playlist trống — thêm video bên dưới.</div>`;
    return;
  }
  container.innerHTML = playlist.map((v, i) => `
    <div class="video-card">
      <img class="thumb" src="${thumbUrl(v.id)}"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
           alt="">
      <div class="thumb-placeholder" style="display:none;">▶</div>
      <div class="video-info">
        <div class="video-label">${escHtml(v.label || `Video ${i + 1}`)}</div>
        <div class="video-meta">
          <span class="video-id">${v.id}</span>
          ${v.duration ? `<span>${v.duration}s</span>` : ''}
        </div>
      </div>
      <div class="video-actions">
        <div class="order-btns">
          <button class="btn-order" onclick="move(${i},-1)" ${i === 0 ? 'disabled' : ''} title="Lên">↑</button>
          <button class="btn-order" onclick="move(${i}, 1)" ${i === playlist.length-1 ? 'disabled' : ''} title="Xuống">↓</button>
        </div>
        <button class="btn btn-danger btn-sm" onclick="removeVideo(${i})">Xóa</button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Playlist actions ──────────────────────────────────────────
function addVideo() {
  const urlVal  = document.getElementById('new-url').value;
  const label   = document.getElementById('new-label').value.trim();
  const durVal  = document.getElementById('new-duration').value;
  const id      = extractYTId(urlVal);

  if (!id) { toast('URL/ID không hợp lệ', 'error'); return; }
  if (playlist.some(v => v.id === id)) { toast('Video này đã có trong playlist', 'error'); return; }

  playlist.push({ id, label: label || `Video ${playlist.length + 1}`, duration: durVal ? parseInt(durVal) : null });
  document.getElementById('new-url').value      = '';
  document.getElementById('new-label').value    = '';
  document.getElementById('new-duration').value = '';
  document.getElementById('new-thumb').style.display = 'none';
  markDirty(true);
  render();
}

function removeVideo(i) {
  playlist.splice(i, 1);
  markDirty(true);
  render();
}

function move(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= playlist.length) return;
  [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
  markDirty(true);
  render();
}

function markDirty(val) {
  dirty = val;
  const btn  = document.getElementById('btn-save');
  const info = document.getElementById('save-info');
  btn.disabled = !val;
  info.textContent = val
    ? `${playlist.length} video — có thay đổi chưa lưu.`
    : `${playlist.length} video — đã đồng bộ với GitHub.`;
}

// ── Build config.js content ───────────────────────────────────
function buildConfigJs() {
  const syncMin    = parseInt(document.getElementById('cfg-sync').value)       || 5;
  const reloadHour = parseInt(document.getElementById('cfg-reload-hour').value) ?? 8;
  const showStatus = document.getElementById('cfg-status').checked;

  const playlistStr = playlist.map(v => {
    const parts = [`id: '${v.id}'`];
    if (v.duration) parts.push(`duration: ${v.duration}`);
    parts.push(`label: '${(v.label || '').replace(/'/g, "\\'")}'`);
    return `  { ${parts.join(', ')} }`;
  }).join(',\n');

  return `// ═══════════════════════════════════════════════════════════════
//  PLAYLIST CONFIG — Được quản lý qua Admin Dashboard
//  Sửa tại: https://${document.getElementById('gh-owner').value.trim()}.github.io/${document.getElementById('gh-repo').value.trim()}/admin.html
// ═══════════════════════════════════════════════════════════════
const PLAYLIST = [
${playlistStr}
];

// ═══════════════════════════════════════════════════════════════
//  APP CONFIG
// ═══════════════════════════════════════════════════════════════
const APP_CONFIG = {
  syncIntervalMinutes: ${syncMin},
  dailyReloadHour: ${reloadHour},
  dailyReloadMinute: 0,
  showStatusBar: ${showStatus},
  errorSkipDelay: 2000,
};
`;
}

// ── Parse config.js content → playlist ───────────────────────
function parseConfigJs(src) {
  try {
    // Extract PLAYLIST array using regex
    const match = src.match(/const\s+PLAYLIST\s*=\s*\[([\s\S]*?)\];/);
    if (!match) return null;
    // Safely eval inside a sandboxed function
    const fn = new Function(`const PLAYLIST = [${match[1]}]; return PLAYLIST;`);
    const pl = fn();
    return Array.isArray(pl) ? pl : null;
  } catch (e) {
    console.error('Parse error:', e);
    return null;
  }
}

function parseAppConfig(src) {
  try {
    const match = src.match(/const\s+APP_CONFIG\s*=\s*\{([\s\S]*?)\};/);
    if (!match) return null;
    const fn = new Function(`const APP_CONFIG = {${match[1]}}; return APP_CONFIG;`);
    return fn();
  } catch { return null; }
}

// ── GitHub API helpers ────────────────────────────────────────
function getGHParams() {
  return {
    token: document.getElementById('gh-token').value.trim(),
    owner: document.getElementById('gh-owner').value.trim(),
    repo : document.getElementById('gh-repo').value.trim(),
  };
}

async function ghFetch(path, options = {}) {
  const { token, owner, repo } = getGHParams();
  if (!token) throw new Error('Chưa nhập GitHub Token');
  const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
  const res = await fetch(url, {
    ...options,
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  return data;
}

// ── Load from GitHub ──────────────────────────────────────────
async function loadFromGitHub() {
  saveLocalSettings();
  toast('Đang tải...', 'info');
  try {
    const data    = await ghFetch('config.js');
    const content = atob(data.content.replace(/\n/g, ''));
    const pl      = parseConfigJs(content);
    const cfg     = parseAppConfig(content);
    if (!pl) throw new Error('Không parse được config.js');

    playlist = pl;
    if (cfg) {
      document.getElementById('cfg-sync').value        = cfg.syncIntervalMinutes ?? 5;
      document.getElementById('cfg-reload-hour').value = cfg.dailyReloadHour ?? 8;
      document.getElementById('cfg-status').checked    = cfg.showStatusBar ?? true;
    }
    markDirty(false);
    render();
    toast(`Đã tải ${playlist.length} video từ GitHub`, 'success');
  } catch (e) {
    toast('Lỗi: ' + e.message, 'error');
  }
}

// ── Save to GitHub ─────────────────────────────────────────────
async function saveToGitHub() {
  if (!playlist.length) { toast('Playlist trống, không lưu', 'error'); return; }
  saveLocalSettings();
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Đang lưu...';
  toast('Đang cập nhật GitHub...', 'info');

  try {
    // Get current SHA
    const current = await ghFetch('config.js');
    const sha     = current.sha;

    // Build new content
    const newContent = buildConfigJs();
    const encoded    = btoa(unescape(encodeURIComponent(newContent)));

    await ghFetch('config.js', {
      method: 'PUT',
      body: JSON.stringify({
        message: `chore: update playlist via admin dashboard`,
        content: encoded,
        sha,
      }),
    });

    markDirty(false);
    toast('Đã lưu! GitHub Pages sẽ cập nhật sau ~1 phút.', 'success');
  } catch (e) {
    toast('Lỗi: ' + e.message, 'error');
    markDirty(true);
  } finally {
    btn.textContent = '↑ Lưu lên GitHub';
  }
}

// ── Toast ──────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}

// ── Init ───────────────────────────────────────────────────────
render();
</script>
</body>
</html>
