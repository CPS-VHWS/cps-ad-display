<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AdDisplay Portrait">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="../icons/icon-192.png">
  <title>Ad Display — Dọc</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; cursor:none; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
    #player-wrap {
      position:fixed;
      top:0; left:0; right:0;
      bottom:-60px;
      overflow:hidden; background:#000;
    }

    /* Cover — portrait (9:16) */
    #yt-player, #gd-player {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:56.25vh;
      height:calc(100vh + 60px);
      min-width:100vw; min-height:177.78vw;
      pointer-events:none; border:none;
    }
    #yt-player iframe { width:100%!important; height:100%!important; border:none; pointer-events:none; }
    #gd-player { display:none; }
    #img-player { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; pointer-events:none; }

    #overlay { position:fixed; inset:0; z-index:100; cursor:none; background:transparent; }
    #status { position:fixed; bottom:12px; left:60px; right:14px; color:rgba(255,255,255,0.25); font:9px/1.5 'SF Mono','Consolas',monospace; z-index:200; pointer-events:none; text-align:right; white-space:pre-line; }
    #mute-btn { position:fixed; bottom:10px; left:12px; z-index:200; background:transparent; border:none; cursor:pointer; opacity:0.25; transition:opacity .2s; padding:4px; }
    #mute-btn:hover { opacity:0.8; }
    #splash { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:300; transition:opacity 0.6s ease; }
    #splash.hidden { opacity:0; pointer-events:none; }
    #splash-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.4); animation:pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
  </style>
</head>
<body>
  <div id="splash"><div id="splash-dot"></div></div>
  <div id="player-wrap">
    <div id="yt-player"></div>
    <iframe id="gd-player" allow="autoplay" src="about:blank"></iframe>
    <img id="img-player" src="" alt="">
  </div>
  <div id="overlay"></div>
  <div id="status"></div>
  <button id="mute-btn" title="Bật/tắt tiếng">
    <svg id="icon-sound" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <svg id="icon-mute" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
  </button>
  <script src="../config.js"></script>
  <script src="../config-watcher.js"></script>
  <script>
  const _region   = new URLSearchParams(location.search).get('r');
  const _campaign = new URLSearchParams(location.search).get('c');
  const _filtered = PLAYLIST_PORTRAIT.filter(v => {
    if (v.regions !== undefined) {
      if (v.regions.length === 0) return false;
      if (_region && !v.regions.includes(_region)) return false;
    }
    if (_campaign && v.campaign && v.campaign !== _campaign) return false;
    return true;
  });
  // Fallback: nếu filter ra playlist rỗng (URL sai param) → phát toàn bộ tránh màn hình đen
  const PLAYLIST = _filtered.length ? _filtered : PLAYLIST_PORTRAIT;
  // Cache tổng thời lượng — playlist không đổi trong suốt session
  const TOTAL_DUR_MS = PLAYLIST.reduce((s, v) => s + Math.max(1, (v.duration || 60)) * 1000, 0);

  let player = null, currentIndex = 0, isReady = false;
  let _muted = true; // khai báo sớm — syncAndPlay dùng _muted trước khi nó được gán
  let _vidStartTime = 0, _vidDuration = 0;
  let _configChanged = false;
  let globalWatchdog = null;
  let _lastDriftCheck = 0; // throttle YouTube IPC getCurrentTime()
  let ytSkipWatchdog = null; // riêng cho skipEnd detection

  window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player('yt-player', {
      playerVars: { autoplay:1,mute:1,controls:0,disablekb:1,fs:0,iv_load_policy:3,modestbranding:1,rel:0,showinfo:0,playsinline:1,enablejsapi:1 },
      events: { onReady:onPlayerReady, onStateChange:onPlayerStateChange, onError:onPlayerError },
    });
  };

  function onPlayerReady() {
    if (isReady) return; // guard: YouTube API đôi khi fire onReady 2 lần
    isReady = true; player.mute();
    setTimeout(() => document.getElementById('splash').classList.add('hidden'), 800);
    scheduleHourlyReload(); startStatusTicker(); startConfigWatcher('../config.js');
    syncAndPlay();
    startGlobalWatchdog();
    setupIdleFullscreen();
  }
  function onPlayerStateChange(e) { if (e.data === 0) syncAndPlay(); }
  function onPlayerError(e) {
    console.warn('[AdDisplay:Portrait] Error:', e.data);
    setTimeout(syncAndPlay, APP_CONFIG.errorSkipDelay);
  }

  function getAbsoluteSyncState() {
    if (!TOTAL_DUR_MS) return null;
    const posMs = Date.now() % TOTAL_DUR_MS;
    let acc = 0;
    for (let i = 0; i < PLAYLIST.length; i++) {
      const vDurMs = Math.max(1, (PLAYLIST[i].duration || 60)) * 1000;
      if (posMs < acc + vDurMs) return { index: i, offsetSec: (posMs - acc) / 1000 };
      acc += vDurMs;
    }
    return { index: 0, offsetSec: 0 };
  }

  function syncAndPlay() {
    if (_configChanged) { location.reload(true); return; }
    const state = getAbsoluteSyncState();
    if (!state) return;

    const isSameVideo = (currentIndex === state.index);
    currentIndex = state.index;
    const v = PLAYLIST[currentIndex];

    clearInterval(ytSkipWatchdog);
    document.getElementById('yt-player').style.display  = 'none';
    document.getElementById('gd-player').style.display  = 'none';
    document.getElementById('img-player').style.display = 'none';

    if (v.type === 'image') {
      const el = document.getElementById('img-player');
      el.style.display = 'block';
      el.src = v.id.startsWith('http') ? v.id : `https://drive.google.com/uc?id=${v.id}&export=view`;
      _vidDuration = (v.duration || 5);
      _vidStartTime = Date.now() - (state.offsetSec * 1000);
    } else if (v.type === 'gdrive') {
      if (!isSameVideo) {
        if (player && isReady) { try { player.stopVideo(); } catch(e){} }
        const gd = document.getElementById('gd-player');
        gd.style.display = 'block';
        gd.src = `https://drive.google.com/file/d/${v.id}/preview?rm=minimal&autoplay=1`;
      } else {
        document.getElementById('gd-player').style.display = 'block';
      }
      _vidDuration = (v.duration || 1800);
      _vidStartTime = Date.now() - (state.offsetSec * 1000);
    } else {
      document.getElementById('yt-player').style.display = 'block';
      document.getElementById('gd-player').src = 'about:blank';
      if (!isReady || !player) return;

      if (isSameVideo && player.getPlayerState() === 1) {
        const cur = player.getCurrentTime();
        if (Math.abs(cur - state.offsetSec) > 3) player.seekTo(state.offsetSec, true);
      } else {
        player.loadVideoById({ videoId: v.id, startSeconds: state.offsetSec });
        _muted ? player.mute() : player.unMute();
      }

      // skipEnd: thoát trước ~15% cuối để tránh hiện end screen YouTube
      if (v.skipEnd) {
        ytSkipWatchdog = setInterval(() => {
          if (!player || !isReady || player.getPlayerState() !== 1) return;
          const dur = player.getDuration(), cur = player.getCurrentTime();
          const skipAt = Math.min(20, Math.max(2, dur * 0.15));
          if (dur > 0 && (dur - cur) <= skipAt) { clearInterval(ytSkipWatchdog); syncAndPlay(); }
        }, 500);
      }
    }
  }

  function startGlobalWatchdog() {
    clearInterval(globalWatchdog);
    globalWatchdog = setInterval(() => {
      if (document.visibilityState !== 'visible') return;
      if (_configChanged) { location.reload(true); return; }
      const state = getAbsoluteSyncState();
      if (!state) return;

      if (state.index !== currentIndex) {
        syncAndPlay();
        return;
      }

      const v = PLAYLIST[currentIndex];
      if ((!v.type || v.type === 'youtube') && player && isReady && player.getPlayerState() === 1) {
        // Throttle: chỉ gọi getCurrentTime() (IPC sang iframe) mỗi 5 giây
        const now = Date.now();
        if (now - _lastDriftCheck >= 5000) {
          _lastDriftCheck = now;
          const cur = player.getCurrentTime();
          if (Math.abs(cur - state.offsetSec) > 5) player.seekTo(state.offsetSec, true);
        }
      }
    }, 1000);
  }

  // setTimeout thay setInterval — không poll 30s/lần, chỉ fire 1 lần đúng giờ
  function scheduleHourlyReload() {
    const now = new Date();
    const target = new Date(now); target.setHours(now.getHours() + 1, 0, 0, 0);
    const jitterMs = Math.floor(Math.random() * 300 * 1000); // jitter 0–5 phút
    const delay = Math.max(0, target.getTime() + jitterMs - Date.now());
    setTimeout(() => location.reload(true), delay);
  }

  function enterFS() {
    const el = document.documentElement;
    const fn = el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
    if (fn) fn.call(el).catch(()=>{});
  }
  function exitFS() {
    const fn = document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen;
    if (fn && (document.fullscreenElement||document.webkitFullscreenElement)) fn.call(document).catch(()=>{});
  }
  function isFS() { return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement); }

  const overlay = document.getElementById('overlay');
  overlay.addEventListener('click',      () => isFS() ? exitFS() : enterFS());
  overlay.addEventListener('touchstart', () => isFS() ? exitFS() : enterFS(), { passive:true });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    enterFS();
    _bcAnnounce();
    syncAndPlay();
  });

  // Tab coordination: chỉ tab đang visible mới phát
  const _bc = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('cps-display') : null;
  function _bcAnnounce() {
    if (_bc) _bc.postMessage({ type: 'active', href: location.href });
  }
  if (_bc) _bc.onmessage = (e) => {
    if (e.data.type !== 'active' || e.data.href !== location.href) return;
    if (document.visibilityState === 'visible') return;
    if (player && isReady && player.getPlayerState() === 1) try { player.pauseVideo(); } catch(_) {}
  };
  window.addEventListener('beforeunload', () => { if (_bc) _bc.close(); });

  // Idle 2 phút không tương tác → vào lại fullscreen
  function setupIdleFullscreen() {
    let idleTimer;
    function reset() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => { if (!isFS()) enterFS(); }, 2 * 60 * 1000);
    }
    ['mousemove','keydown','touchstart','click','scroll'].forEach(e =>
      document.addEventListener(e, reset, { passive:true })
    );
    reset();
  }

  function fmtSec(s) {
    s = Math.max(0, Math.round(s));
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }
  function startStatusTicker() {
    if (!APP_CONFIG.showStatusBar) return;
    const el = document.getElementById('status');
    setInterval(() => {
      const state = getAbsoluteSyncState();
      if (!state) return;
      const v = PLAYLIST[state.index];
      const vid = v ? (v.label || `Video ${state.index + 1}`) : '—';
      const rem = (v.duration || 60) - state.offsetSec;
      const ctx = [_region, _campaign].filter(Boolean).join(' · ');
      el.textContent = `${new Date().toLocaleTimeString('vi-VN')} | ${vid} ${fmtSec(rem)}${ctx ? ' | ' + ctx : ''}`;
    }, 1000);
  }

  function updateMuteIcon() {
    document.getElementById('icon-sound').style.display = _muted ? 'none' : 'block';
    document.getElementById('icon-mute').style.display  = _muted ? 'block' : 'none';
  }
  document.getElementById('mute-btn').addEventListener('click', e => {
    e.stopPropagation();
    _muted = !_muted;
    if (player && isReady) { _muted ? player.mute() : player.unMute(); }
    updateMuteIcon();
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js', { scope:'../' }).catch(()=>{});
  (function(){ const s=document.createElement('script'); s.src='https://www.youtube.com/iframe_api'; s.async=true; document.head.appendChild(s); })();
  </script>
</body>
</html>
